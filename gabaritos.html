<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gabaritos Salvos — OMR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="gabaritos-page">
  <div class="page-header">
    <div class="page-header-left">
      <div class="badge">OMR // Optical Mark Recognition</div>
      <h1>Gabaritos<br><span>Salvos</span></h1>
      <p id="page-subtitle"></p>
    </div>
    <a href="index.html" class="nav-link">← Voltar</a>
  </div>

  <div id="gabaritos-list"></div>
</div>

<!-- ─── SCANNER MODAL ──────────────────────────────────────── -->
<div id="scanner-modal" hidden>
  <div id="scanner-overlay">
    <div id="scanner-header">
      <span id="scanner-title">Corretor</span>
      <button id="btn-close-scanner" onclick="closeScanner()">×</button>
    </div>

    <div id="scanner-viewport">
      <video id="scanner-video" autoplay playsinline muted></video>
      <canvas id="scanner-canvas"></canvas>
    </div>

    <div id="scanner-status">● Iniciando...</div>

    <div id="scanner-result" hidden>
      <div id="result-score-row">
        <span id="result-score">0 / 0</span>
        <span id="result-pct">0%</span>
      </div>
      <div id="result-detail"></div>
    </div>

    <div id="scanner-actions">
      <button id="btn-capture" class="btn-scanner btn-scanner-primary" onclick="captureFrame()">Capturar</button>
      <button id="btn-new-scan" class="btn-scanner" hidden onclick="resumeScan()">Nova leitura</button>
      <button class="btn-scanner" onclick="closeScanner()">Fechar</button>
    </div>
  </div>
</div>

<script src="gabaritos.js"></script>
<script src="scanner.js"></script>
</body>
</html>
